services:
  # ─────────────────────────────────────
  # Vector DB : Qdrant
  # ─────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: codeMind-qdrant
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - codeMind-net
    restart: unless-stopped

  # ─────────────────────────────────────
  # LLM : Ollama
  # ─────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: codeMind-ollama
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - codeMind-net
    restart: unless-stopped

  # ─────────────────────────────────────
  # Backend : FastAPI
  # ─────────────────────────────────────
  fastapi:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: codeMind-backend
    env_file: .env
    volumes:
      - upload_data:/data/uploads
      - sqlite_data:/data/db
      - model_cache:/root/.cache/huggingface
    depends_on:
      - qdrant
      - ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - codeMind-net
    restart: unless-stopped

  # ─────────────────────────────────────
  # Frontend : Streamlit
  # ─────────────────────────────────────
  streamlit:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: codeMind-frontend
    ports:
      - "8501:8501"
    env_file: .env
    depends_on:
      fastapi:
        condition: service_healthy
    networks:
      - codeMind-net
    restart: unless-stopped

volumes:
  qdrant_data:          # Qdrant 벡터 DB 데이터
  ollama_data:          # Ollama LLM 모델 데이터
  model_cache:          # HuggingFace 임베딩 모델 캐시
  upload_data:          # 업로드된 소스코드 파일
  sqlite_data:          # SQLite 사용자/히스토리 DB

networks:
  codeMind-net:
    driver: bridge
